<html>
<head>
    <title>Sign Up</title>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes slideInLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #84fab0, #8fd3f4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.98);
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            animation: fadeInUp 0.8s ease-out;
        }

        .container h1 {
            text-align: center;
            color: #2d3436;
            font-size: 28px;
            margin-bottom: 30px;
            position: relative;
            animation: slideInLeft 0.8s ease-out;
        }

        .container h1:after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
            margin: 10px auto 0;
            border-radius: 2px;
            animation: slideInRight 0.8s ease-out;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            animation: slideInRight 0.8s ease-out;
            animation-fill-mode: both;
        }

        .form-group:nth-child(odd) {
            animation: slideInLeft 0.8s ease-out;
            animation-fill-mode: both;
        }

        label {
            color: #2d3436;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
            transition: color 0.3s ease;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="password"],
        select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #a1c4fd;
            box-shadow: 0 0 0 4px rgba(161, 196, 253, 0.1);
            animation: pulse 0.5s ease-out;
        }

        input:invalid:not(:placeholder-shown) {
            border-color: #ff7675;
            animation: shake 0.5s ease-in-out;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 10px;
        }

        .rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            padding: 10px;
            background-color: #f8fafc;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .checkbox:hover {
            background-color: #e6e9f0;
            transform: translateX(5px);
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            accent-color: #a1c4fd;
        }

        .upload {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            border: 2px dashed #a1c4fd;
            padding: 15px;
            cursor: pointer;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            overflow: hidden;
            transition: all 0.3s ease;
            background-color: #f8fafc;
            position: relative;
            animation: pulse 2s infinite;
        }

        .upload:hover {
            border-color: #c2e9fb;
            transform: scale(1.05);
            animation: none;
        }

        .upload img {
            max-width: 50px;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .upload:hover img {
            opacity: 1;
            animation: rotate 1s linear infinite;
        }

        button {
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #84fab0, #8fd3f4);
            background-size: 300% 300%;
            color: #2d3436;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 200px;
            margin: 20px auto 0;
            display: block;
            animation: fadeInUp 0.8s ease-out;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(161, 196, 253, 0.4);
            animation: gradientBG 3s ease infinite;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            .row {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <form>
            <div class="upload">
                <label for="file-upload">
                    <img src="/api/placeholder/50/50" alt="Upload Photo">
                </label>
                <input id="file-upload" type="file" style="display:none;" required />
            </div>

            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="row">
                <div class="form-group rows">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" placeholder="Enter phone number" required>
                </div>
                <div class="form-group rows">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter email address" required>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Flat, House no, Building, Apartment" required>
                <input type="text" name="street" placeholder="Area, Street, Sector, Village" required>
            </div>

            <div class="row">
                <div class="form-group rows">
                    <label for="pincode">Pin Code</label>
                    <input type="text" name="pincode" id="pincode" placeholder="Enter pincode" required>
                </div>
                <div class="form-group rows">
                    <label for="town">Town/City</label>
                    <input type="text" name="town" id="town" placeholder="Enter town/city" required>
                </div>
                <div class="form-group rows">
                    <label for="state">State</label>
                    <select id="state" name="state" required>
                        <option value="">Select State</option>
                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                        <option value="Assam">Assam</option>
                        <option value="Bihar">Bihar</option>
                        <option value="Chhattisgarh">Chhattisgarh</option>
                        <option value="Goa">Goa</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Haryana">Haryana</option>
                        <option value="Himachal Pradesh">Himachal Pradesh</option>
                        <option value="Jharkhand">Jharkhand</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Madhya Pradesh">Madhya Pradesh</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Manipur">Manipur</option>
                        <option value="Meghalaya">Meghalaya</option>
                        <option value="Mizoram">Mizoram</option>
                        <option value="Nagaland">Nagaland</option>
                        <option value="Odisha">Odisha</option>
                        <option value="Punjab">Punjab</option>
                        <option value="Rajasthan">Rajasthan</option>
                        <option value="Sikkim">Sikkim</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Telangana">Telangana</option>
                        <option value="Tripura">Tripura</option>
                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                        <option value="Uttarakhand">Uttarakhand</option>
                        <option value="West Bengal">West Bengal</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
            </div>

            <div class="checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to all terms & conditions</label>
            </div>

            <button type="submit">Create Account</button>
        </form>
    </div>
<script src="signupauthenticate.js"></script>
<script src="signupvalidate.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Dog Products</title>
    <style>
        header {
            background: #e6b800;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #8b5e3c;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fff3cd;
            color: #8b5e3c;
        }
        div {
            display: inline-block;
            width: 200px;
            margin: 15px;
            padding: 10px;
            background: #ffeb99;
            border-radius: 10px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: #e6b800;
            color: #8b5e3c;
            border: none;
            padding: 8px;
            border-radius: 5px;
        }
        button:hover {
            background: #cc9900;
        }
    </style>
</head>
<body>
    <header>Paws and Claws</header>

    <h1>Dog Products</h1>
    
    <div>
        <img src="belt.jpg" alt="Dog Belt">
        <h3>Dog Belt</h3>
        <p>Strong and adjustable belt for all sizes.</p>
        <b><p>Rs. 280</p></b>
        <button>Add to Cart</button>
    </div>

    <div>
        <img src="bed.jpg" alt="Dog Bed">
        <h3>Cozy Dog Bed</h3>
        <p>Soft and comfortable bed for your pet.</p>
        <b><p>Rs. 1700</p></b>
        <button>Add to Cart</button>
    </div>

    <div>
        <img src="bowl.jpg" alt="Dog Bowl">
        <h3>Food Bowl</h3>
        <p>Durable and easy-to-clean food bowl.</p>
        <b><p>Rs. 440</p></b>
        <button>Add to Cart</button>
    </div>

    <footer>&copy; 2025 Paws and Claws. All rights reserved.</footer>
</body>
</html>


<html>
<head>
 <title>Payment Gateway</title>
  <style>
    :root {
      --primary-color: #3498db;
      --primary-dark: #2980b9;
      --text-color: #2c3e50;
      --text-light: #7f8c8d;
      --border-color: #ddd;
      --bg-color: #f8f9fa;
      --shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background-color: var(--bg-color);
      color: #333;
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background-color: white;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 30px;
      transition: var(--transition);
    }
    
    h1 {
      color: var(--text-color);
      margin-bottom: 10px;
      text-align: center;
      font-size: clamp(1.5rem, 5vw, 2rem);
    }
    
    h3 {
      color: var(--text-light);
      margin-bottom: 30px;
      text-align: center;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 400;
    }
    
    .payment-methods {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .payment-methods a {
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .payment-methods a:hover {
      transform: scale(1.05);
    }
    
    .payment-methods img {
      height: 60px;
      width: auto;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      object-fit: contain;
    }
    
    .or-separator {
      text-align: center;
      margin: 20px 0;
      position: relative;
    }
    
    .or-separator:before,
    .or-separator:after {
      content: "";
      display: inline-block;
      width: 40%;
      height: 1px;
      background: var(--border-color);
      position: absolute;
      top: 50%;
    }
    
    .or-separator:before {
      left: 0;
    }
    
    .or-separator:after {
      right: 0;
    }
    
    .or-separator p {
      display: inline-block;
      background: white;
      padding: 0 15px;
      position: relative;
      color: var(--text-light);
      font-size: 0.9em;
    }
    
    .card-form {
      margin-top: 20px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-color);
      font-size: 0.95rem;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 16px;
      transition: var(--transition);
    }
    
    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
    }
    
    .expiry-cvv-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .expiry-container,
    .cvv-container {
      flex: 1 1 calc(50% - 10px);
      min-width: 120px;
    }
    
    button {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 10px;
      box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
    }
    
    button:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      color: var(--text-light);
      font-size: 0.9em;
    }
    
    .secure-badge svg {
      margin-right: 8px;
      fill: var(--text-light);
    }
    
    /* Responsive adjustments */
    @media (max-width: 480px) {
      .container {
        padding: 20px 15px;
        margin: 10px;
        border-radius: 12px;
      }
      
      .payment-methods {
        gap: 12px;
      }
      
      .payment-methods img {
        height: 50px;
      }
      
      .expiry-cvv-container {
        flex-direction: column;
        gap: 15px;
      }
      
      .expiry-container,
      .cvv-container {
        flex: 1 1 100%;
      }
      
      button {
        padding: 12px;
      }
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .container {
      animation: fadeIn 0.5s ease-out;
    }
    
    /* Card number formatting */
    input#card-number {
      letter-spacing: 1px;
    }
    
    /* Placeholder styling */
    ::placeholder {
      color: #bbb;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Payment Gateway</h1>
    
    <div class="payment-methods">
      <a href="https://paytm.com/" target="_blank">
        <img src="paytm.png" alt="Paytm">
      </a>
      <a href="https://www.apple.com/apple-pay/" target="_blank">
        <img src="apple.png" alt="Apple Pay">
      </a>
      <a href="https://pay.google.com/intl/en_in/about/" target="_blank">
        <img src="gpay.jpg" alt="Google Pay">
      </a>
    </div>
    
    <div class="or-separator">
      <p>or pay using credit card</p>
    </div>
    
    <form class="card-form">
      <div class="form-group">
        <label for="cardholder">Card Holder's Name</label>
        <input type="text" id="cardholder" placeholder="Enter Full Name" required>
      </div>
      
      <div class="form-group">
        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" required>
      </div>
      
      <div class="expiry-cvv-container">
        <div class="form-group expiry-container">
          <label for="expiry">Expiry Date</label>
          <input type="month" id="expiry" required>
        </div>
        
        <div class="form-group cvv-container">
          <label for="cvv">CVV</label>
          <input type="password" id="cvv" placeholder="CVV" maxlength="4" required>
        </div>
      </div>
      
      <button type="submit">CHECK OUT</button>
    </form>
    
    <div class="secure-badge">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.8 1.1 2.8 2.5V11c.6 0 1.2.6 1.2 1.2v3.5c0 .7-.6 1.3-1.2 1.3h-5.5c-.7 0-1.3-.6-1.3-1.2v-3.5c0-.7.6-1.3 1.2-1.3V9.5C9.2 8.1 10.6 7 12 7zm0 1.2c-.8 0-1.5.5-1.5 1.3V11h3v-1.5c0-.8-.7-1.3-1.5-1.3z"/>
      </svg>
      Secure Checkout - Your payment information is encrypted
    </div>
  </div>
  
  <script>
    // Format card number input to add spaces
    document.getElementById('card-number').addEventListener('input', function(e) {
      let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
      let formattedValue = '';
      
      for (let i = 0; i < value.length; i++) {
        if (i > 0 && i % 4 === 0) {
          formattedValue += ' ';
        }
        formattedValue += value[i];
      }
      
      e.target.value = formattedValue;
    });
  </script>
</body>
</html>
